<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="description" content="Marketeam - marketing talent platform." />
    <meta name="theme-color" content="#060218" />
    <title>Marketeam · Marketing Talent Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Urbanist:wght@600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="site-header">
        <div class="header-left">
          <a class="brand" href="#"><img id="brand-logo" alt="Marketeam" /></a>
          <nav class="nav-links" aria-label="Primary navigation">
            <a class="link-underline dark" href="#">Your Team</a>
            <a class="link-underline dark" href="#">Solutions</a>
            <a class="link-underline dark" href="#">Blog</a>
            <a class="link-underline dark" href="#">Pricing</a>
          </nav>
        </div>
        <div class="header-actions">
          <a class="login-link link-underline light" href="#">Log In</a>
          <div class="btn-border-wrap small"><a class="pill-btn join-btn" href="#"><span>Join Now</span></a></div>
        </div>
      </header>

      <section class="hero">
        <div class="hero-left">
          <h1 class="hero-title" aria-label="Unlock Top Marketing Talent You Thought Was Out of Reach -- Now Just One Click Away!"></h1>
          <div class="hero-actions">
            <div class="btn-border-wrap large">
              <a class="pill-btn start-btn" href="#"><span>Start Project</span><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 18l6-6-6-6" /></svg></a>
            </div>
            <div class="cursor-badge" aria-hidden="true"><svg viewBox="0 0 32 32"><path d="M5.6 2.7 26 17.1c1.2.8.7 2.7-.8 2.8l-8.8.6-4.7 7.4c-.8 1.2-2.7.8-2.9-.7L5.6 2.7Z" /></svg><span>David</span></div>
          </div>
        </div>
        <div class="hero-right" aria-label="Marketing talent visualization">
          <div class="circles-stage" id="circles-stage"></div>
        </div>
      </section>

      <section class="logo-ticker" aria-label="Partner logos"><div class="ticker-track" id="ticker-track"></div></section>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
